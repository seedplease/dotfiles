[colors]
background = #282A2E
background-alt = #373B41
foreground = #FFFFFF
primary = #999EFF
secondary = #8ABEB7
alert = #A54242
disabled = #707880
separator = #4A4FAE

[bar/bar1]
monitor = DVI-0 
bottom = true
width = 100%
height = 24pt
radius = 6
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 4pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
separator = %{T2}|%{T-}
separator-foreground = ${colors.separator}
font-0 = SF Pro Display:style=Semibold:size=11;1
font-1 = SF Pro Display:style=Semibold:antialias=false:size=16;1
font-2 = Material\-Design\-Iconic\-Font:style=Design-Iconic-Font:size=14;1
modules-left = xworkspaces
modules-right = pulseaudio memory cpu wlan date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
; Tray positioning
; Option 1 - center tray placement 
;   tray-position = center
; The following offset looks good when there are a maximum of 5 workspaces
; and up to 5 tray icons.
;   tray-offset-x = -830
; Option 2 - right tray placmenet
;   tray-position = right

[bar/bar2]
monitor = HDMI-0
bottom = true
width = 100%
height = 24pt
radius = 6
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 4pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
separator = %{T2}|%{T-}
separator-foreground = ${colors.separator}
font-0 = SF Pro Display:style=Semibold:size=11;1
font-1 = SF Pro Display:style=Semibold:antialias=false:size=16;1
font-2 = Material\-Design\-Iconic\-Font:style=Design-Iconic-Font:size=14;1
modules-left = xworkspaces
modules-right = pulseaudio memory cpu wlan date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
; Tray positioning
; Option 1 - center tray placement 
   tray-position = center
; The following offset looks good when there are a maximum of 5 workspaces
; and up to 5 tray icons.
;   tray-offset-x = -830
; Option 2 - right tray placmenet
;   tray-position = right


[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "Ôéľ  "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ÔéĽ muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
;format-prefix = "RAM "
format-prefix = "Ôäó"
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
;format-prefix = "CPU "
format-prefix = "ÔŹ†"
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F49E9E}%ifname%%{F#FF4242} ÔĄĶ 

[module/wlan]
inherit = network-base
interface-type = wireless
;label-connected = %{F#999EFF}%ifname%%{F-} %essid% %local_ip%
label-connected = %{F#65FF75}Ôč£ %local_ip%%{F-}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#999EFF}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = " ÔĆ≤  %Y.%m.%d  ÔĆ∑  %H:%M  "

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
